<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tic Tac Toe game using JS and HTML" />
    <meta content="tic-tac-toe-game" property="og:title" />
    <meta property="og:type" content="website" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./reset.css">
    <!-- <link rel="icon" type="image/png" href="image source here for icon on tab"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <header>
        <div class="scoreboard">
            <div class="p1-stats">
                <div class="p1-bg">
                    <i class="p1-pfp fa-solid fa-face-smile"></i>
                </div>
                <p class="p1-name">Player 1</p>
                <p class="p1-score">0</p>
            </div>
            <div class="p2-stats">
                <div class="p2-bg">
                    <i class="p2-pfp fa-solid fa-face-smile"></i>
                </div>
                <p class="p2-name">Player 2</p>
                <p class="p2-score">0</p>
            </div>
        </div>
        <p class="score-counter"></p>
        <p class="turn-display"></p>
        <button class="restart-button">Restart Game?</button>
    </header>
    <main>
        <div id="gameboard"></div>
        
    </main>
    <!-- ADD OPEN BELOW -->
    <dialog class="starting-dialog" > 
            <h1>Tic-Tac-Toe</h1>
            <form id="start-form">
                <label for="player1-name">Player 1 name: </label>
                <input type="text" name="player1-name" id="player1-name">
                <div class="player-emoji-picker">
                        <input type="radio" name="p1-emoji-input" id="p1-e1" 
                        class="rating-radio star-initial" value="1" checked>

                        <label for="p1-e1"><i class="fa-solid fa-star"></i></label>
                        
                        <input type="radio" name="p1-emoji-input" id="p1-e2"
                        class="rating-radio star-initial" value="2">

                        <label for="p1-e2"><i class="fa-solid fa-star"></i></label>
                        
                        <input type="radio" name="p1-emoji-input" id="p1-e3" 
                        class="rating-radio star-initial" value="3">

                        <label for="p1-e3"><i class="fa-solid fa-star"></i></label>
                        
                        <input type="radio" name="p1-emoji-input" id="p1-e4" 
                        class="rating-radio star-initial" value="4">

                        <label for="p1-e4"><i class="fa-solid fa-star"></i></label>
                        
                        <input type="radio" name="p1-emoji-input" id="p1-e5" 
                        class="rating-radio star-initial" value="5">
                        
                        <label for="p1-e5"><i class="fa-solid fa-star"></i></label>
                    </div>
                <label for="player1-name">Player 2 name: </label>
                <input type="text" name="player2-name" id="player2-name">
                <div class="player-emoji-picker">
                        <input type="radio" name="p2-emoji-input" id="p2-e1" 
                        class="rating-radio star-initial" value="1" checked>

                        <label for="p2-e1"><i class="fa-solid fa-star"></i></label>
                        
                        <input type="radio" name="p2-emoji-input" id="p2-e2"
                        class="rating-radio star-initial" value="2">

                        <label for="p2-e2"><i class="fa-solid fa-star"></i></label>
                        
                        <input type="radio" name="p2-emoji-input" id="p2-e3" 
                        class="rating-radio star-initial" value="3">

                        <label for="p2-e3"><i class="fa-solid fa-star"></i></label>
                        
                        <input type="radio" name="p2-emoji-input" id="p2-e4" 
                        class="rating-radio star-initial" value="4">

                        <label for="p2-e4"><i class="fa-solid fa-star"></i></label>
                        
                        <input type="radio" name="p2-emoji-input" id="p2-e5" 
                        class="rating-radio star-initial" value="5">
                        
                        <label for="p2-e5"><i class="fa-solid fa-star"></i></label>
                    </div>
                <button class="start-game-button">Start Game</button>
            </form>
        </dialog>
    <script src="./script.js"></script>
</body>
</html>
